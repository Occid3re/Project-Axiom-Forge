server {
    listen 80;
    listen [::]:80;
    server_name lostuplink.com www.lostuplink.com;
    return 301 https://lostuplink.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.lostuplink.com;

    ssl_certificate /etc/letsencrypt/live/lostuplink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lostuplink.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://lostuplink.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lostuplink.com;

    root /opt/axiom-forge/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/lostuplink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lostuplink.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
