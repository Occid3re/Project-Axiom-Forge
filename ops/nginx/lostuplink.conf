server {
    listen 80;
    listen [::]:80;
    server_name lostuplink.com www.lostuplink.com;
    return 301 https://lostuplink.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.lostuplink.com;
    ssl_certificate /etc/letsencrypt/live/lostuplink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lostuplink.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://lostuplink.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lostuplink.com;

    root /opt/axiom-forge/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/lostuplink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lostuplink.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Socket.IO WebSocket proxy → Node.js server
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Cache hashed static assets forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
